<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyX AI Chat</title>
<style>
body{margin:0;font-family:Arial,sans-serif;display:flex;flex-direction:column;height:100vh}
.taskbar{background:#1e1e1e;color:white;padding:10px;display:flex;justify-content:space-between;align-items:center}
.chat-container{flex:1;padding:10px;overflow-y:auto;background:#f5f5f5}
.chat-message{margin-bottom:10px}
.chat-message strong{display:inline-block;min-width:70px}
.input-container{display:flex;padding:10px;background:#ddd}
.input-container input{flex:1;padding:10px;font-size:16px}
.input-container button{padding:10px 20px;margin-left:5px;cursor:pointer}
</style>
</head>
<body>

<div class="taskbar"><span>KeyX AI Chat</span></div>

<div class="chat-container" id="chatContainer"></div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Type your message...">
    <button id="sendBtn">Send</button>
</div>

<script>
// 🔑 HANO SHYIRAMO API KEY YAWE
const apiKey = "AIzaSyA1BdjHTeUvYKLCGUWul6eqjWvo2Gpy6dA"; // ← shira key yawe ya AI Studio

const chatContainer = document.getElementById('chatContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

sendBtn.onclick = sendMessage;
userInput.addEventListener('keypress', function(e){
    if(e.key==='Enter') sendMessage();
});

async function sendMessage(){
    const message = userInput.value.trim();
    if(!message) return;
    appendMessage('You', message);
    userInput.value = '';

    const chatBubble = appendMessage('KeyX AI', '...');

    try{
        const response = await fetch('https://api.aistudio.ai/keyx/v1/gen', {
            method:'POST',
            headers:{
                'Content-Type':'application/json',
                'Authorization':`Bearer ${apiKey}`
            },
            body:JSON.stringify({
                model:'gen-lang-client-0320536118',
                prompt:message,
                stream:true
            })
        });

        const reader = response.body.getReader();
        let result = '';
        while(true){
            const {done,value} = await reader.read();
            if(done) break;
            result += new TextDecoder().decode(value);
            chatBubble.innerText = result;
        }

    } catch(err){
        chatBubble.innerText = 'Error: ' + err.message;
    }
}

function appendMessage(sender,text){
    const div=document.createElement('div');
    div.className='chat-message';
    div.innerHTML=`<strong>${sender}:</strong> <span>${text}</span>`;
    chatContainer.appendChild(div);
    chatContainer.scrollTop=chatContainer.scrollHeight;
    return div.querySelector('span');
}
</script>

</body>
</html>
