<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KEYX SCORE</title>

<style>

/* ================= BODY ================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0b0f1a;
    color: white;
}

/* ================= HEADER (FIXED) ================= */
header {
    position: fixed; /* ntizimuka */
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
}

header h1 {
    color: #9be23c;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
}

/* ================= HERO ================= */
.hero {
    height: 100vh;

    /* Koresha image nyayo (iyi ni demo) */
    background: url("https://images.unsplash.com/photo-1517649763962-0c623066013b") no-repeat center/cover;

    display: flex;
    align-items: center;
    padding: 60px;
    margin-top: 70px; /* kugirango header idapfuka content */
}

.overlay {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 10px;
}

.hero h2 {
    font-size: 50px;
    color: #facc15;
}

/* ================= BUTTON ================= */
.btn {
    background: #9be23c;
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

/* ================= TABLE SECTION ================= */
.section {
    padding: 40px;
}

.table-container {
    background: #1f2937;
    padding: 20px;
    border-radius: 10px;
}

/* ================= TABLE STYLE ================= */
table {
    width: 100%;
    border-collapse: collapse;
    text-align: center;
}

th {
    background: #111827;
    padding: 10px;
}

td {
    padding: 10px;
}

tr:nth-child(even) {
    background: #1f2937;
}

tr:nth-child(odd) {
    background: #111827;
}

/* ================= PAGINATION ================= */
.pagination {
    margin-top: 20px;
    text-align: center;
}

.pagination button {
    padding: 10px 15px;
    margin: 5px;
    background: #facc15;
    border: none;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <h1>KEYX SCORE</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Sports</a>
        <a href="#">Live</a>
    </nav>
</header>

<!-- ================= HERO ================= -->
<div class="hero">
    <div class="overlay">
        <h2>BET & WIN BIG!</h2>
        <p>Best odds on all sports</p>

        <!-- 🔥 BUTTON NSHYA -->
        <button class="btn">BETTER SURE</button>
    </div>
</div>

<!-- ================= TABLE PAGE 1 ================= -->
<div class="section" id="page1">
    <h2>Live Matches - Page 1</h2>

    <div class="table-container">
        <table>
            <tr>
                <th>Match</th>
                <th>1</th>
                <th>X</th>
                <th>2</th>
            </tr>

            <tr>
                <td>Arsenal vs Chelsea</td>
                <td>2.10</td>
                <td>3.20</td>
                <td>2.80</td>
            </tr>

            <tr>
                <td>Man United vs Liverpool</td>
                <td>2.50</td>
                <td>3.00</td>
                <td>2.60</td>
            </tr>
        </table>
    </div>

    <div class="pagination">
        <button onclick="nextPage()">Next ▶</button>
    </div>
</div>

<!-- ================= TABLE PAGE 2 ================= -->
<div class="section" id="page2" style="display:none;">
    <h2>Live Matches - Page 2</h2>

    <div class="table-container">
        <table>
            <tr>
                <th>Match</th>
                <th>1</th>
                <th>X</th>
                <th>2</th>
            </tr>

            <tr>
                <td>Barcelona vs Real Madrid</td>
                <td>2.30</td>
                <td>3.10</td>
                <td>2.90</td>
            </tr>

            <tr>
                <td>PSG vs Bayern</td>
                <td>2.40</td>
                <td>3.30</td>
                <td>2.70</td>
            </tr>
        </table>
    </div>

    <div class="pagination">
        <button onclick="prevPage()">◀ Back</button>
    </div>
</div>

<!-- ================= JAVASCRIPT ================= -->
<script>

/* 👉 Ibi bituma umuntu ajya kuri next page */
function nextPage() {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
    window.scrollTo(0,0); // isubiza hejuru
}

/* 👉 Subira inyuma */
function prevPage() {
    document.getElementById("page2").style.display = "none";
    document.getElementById("page1").style.display = "block";
    window.scrollTo(0,0);
}

</script>

</body>
</html>
