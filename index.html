<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KEYX SCORE</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0b0f1a;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(0,0,0,0.7);
}

header h1 {
    color: #9be23c;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
}

.hero {
    height: 70vh;
    background: url("https://images.unsplash.com/photo-1517649763962-0c623066013b") no-repeat center center/cover;
    display: flex;
    align-items: center;
    padding: 60px;
}

.overlay {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 10px;
}

.hero h2 {
    font-size: 50px;
    color: #facc15;
}

.btn {
    background: #facc15;
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

/* TABLE SECTION */
.table-section {
    padding: 40px;
}

.table-container {
    background: #1f2937;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <h1>KEYX SCORE</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Sports</a>
        <a href="#">Live</a>
    </nav>
</header>

<div class="hero">
    <div class="overlay">
        <h2>BET & WIN BIG!</h2>
        <p>Best odds on all sports</p>
        <button class="btn">JOIN NOW</button>
    </div>
</div>

<!-- ========================= -->
<table width="100%" style="border-collapse: collapse; text-align: center; color: white;">
    
    <tr style="background: #111827;">
        <th style="padding: 10px;">Match</th>
        <th>1</th>
        <th>X</th>
        <th>2</th>
    </tr>

    <tr style="background: #1f2937;">
        <td style="padding: 10px;">Arsenal vs Chelsea</td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">2.10</button></td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">3.20</button></td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">2.80</button></td>
    </tr>

    <tr style="background: #111827;">
        <td style="padding: 10px;">Man United vs Liverpool</td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">2.50</button></td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">3.00</button></td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">2.60</button></td>
    </tr>

    <tr style="background: #1f2937;">
        <td style="padding: 10px;">Barcelona vs Real Madrid</td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">2.30</button></td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">3.10</button></td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">2.90</button></td>
    </tr>

    <tr style="background: #111827;">
        <td style="padding: 10px;">PSG vs Bayern</td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">2.40</button></td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">3.30</button></td>
        <td><button style="padding:8px 15px; background:#9be23c; border:none;">2.70</button></td>
    </tr>

</table>
<!-- ========================= -->

<div class="table-section">
    <h2>Live Matches</h2>

    <div class="table-container">

        <!-- 👉 SHYIRAMO TABLE YAWE HANO -->
        <!-- Example (ushobora kuyisiba ugashyiramo iyawe): -->

        <table border="1" width="100%" style="color:white; text-align:center;">
            <tr>
                <th>Team A</th>
                <th>Team B</th>
                <th>Odds</th>
            </tr>
            <tr>
                <td>Arsenal</td>
                <td>Chelsea</td>
                <td>2.5</td>
            </tr>
        </table>

    </div>
</div>

</body>
</html>
