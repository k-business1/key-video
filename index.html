<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KEYX AI</title>

<style>

body{
    margin:0;
    background:#0a0f1f;
    font-family:Arial;
    color:white;
}

.header{
    background:#11183a;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.chat-box{
    height:70vh;
    overflow-y:auto;
    padding:20px;
}

.user{
    background:#00cc66;
    padding:10px;
    border-radius:10px;
    margin:10px;
    text-align:right;
}

.ai{
    background:#1e2a5a;
    padding:10px;
    border-radius:10px;
    margin:10px;
    text-align:left;
}

.input-box{
    position:fixed;
    bottom:0;
    width:100%;
    background:#11183a;
    padding:10px;
    display:flex;
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:5px;
}

button{
    padding:10px 20px;
    background:#00cc66;
    color:white;
    border:none;
    margin-left:5px;
    border-radius:5px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">🤖 KEYX AI</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">
<input type="text" id="msg" placeholder="Ask KEYX AI...">
<button onclick="send()">Send</button>
</div>

<script>

const API_KEY = "gen-lang-client-0320536118";

async function send(){

let msg = document.getElementById("msg").value;

if(!msg) return;

let chat = document.getElementById("chat");

chat.innerHTML += `<div class="user">${msg}</div>`;

document.getElementById("msg").value="";

let response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{ text: msg }
]
}
]
})
});

let data = await response.json();

let aiText = data.candidates[0].content.parts[0].text;

chat.innerHTML += `<div class="ai">${aiText}</div>`;

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
