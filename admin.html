<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Guhatira fomu y'ijambo ry'ibanga kugaragara ku nguvu igitandukira */
    #adminAuthOv {
      display: flex !important;
      opacity: 1 !important;
      visibility: visible !important;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #admPanel {
      display: none;
    }
    /* Iyo login yemewe */
    .admin-logged-in #adminAuthOv {
      display: none !important;
    }
    .admin-logged-in #admPanel {
      display: block !important;
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div style="display: none !important;">
  <div id="pbar"></div>
  <div id="pgLoad"><div class="spin"></div></div>
  <div id="loginReq"></div>
  <nav id="nav"><div class="nav-links"></div><input id="si"><button id="admNavBtn"></button></nav>
  <div id="notifPanel"><div id="notifList"></div></div>
  <div id="udrop"></div>
  <div id="appBanner"></div>
  <div id="hero"><div id="hTitle"></div><div id="hMeta"></div><div id="hDesc"></div><div id="hDots"></div><img id="hCover"></div>
  <div class="catpills" id="catPills"></div>
  <div id="advF"><input id="fYear"><select id="fRat"></select><input id="fCo"><select id="fType2"></select></div>
  <div id="trendSec"><div id="tRow"></div></div>
  <div id="newSec"><div id="nRow"></div></div>
  <div id="mGrid"></div>
  <div id="emptySt"><p id="emptyMsg"></p></div>
  <div id="guestBanner"></div>
  <span id="yrSpan">2026</span>
  <div id="srOv"><span id="srQ"></span><div id="srSub"></div><div id="srEx"></div><div id="srSim"></div></div>
  <div id="authOv"><div id="authTitle"></div><div id="form-login"><input id="liE"><input id="liP"><div id="liErr"></div></div><div id="form-register"><input id="reN"><input id="reE"><input id="reP"><select id="reCo"></select><div id="reErr"></div></div></div>
  <div id="movOv"><div id="vidWrap"></div><div id="anTitle"></div><div id="anPos"></div><div id="anRingFill"></div><div id="anNum"></div><div id="anProg"></div><img id="mmCovI"><div id="mmBadges"></div><div id="mmTitle"></div><div id="mmMeta"></div><div id="mmActs"></div><div id="dlBar"></div><div id="dlPct"></div><div id="dlSpd"></div><div id="mmDesc"></div><div id="cmtCnt"></div><div id="cmtFA"></div><div id="cmtList"></div></div>
  <div id="pageOv"><div id="pageTit"></div><div id="pageBody"></div></div>
</div>

<div class="ov" id="adminAuthOv">  
  <div class="mbox">    
    <div class="admin-auth-hd">      
      <div class="kb" style="background:#222">🔐</div>      
      <h2>Admin Access</h2><p>Enter your admin password</p>    
    </div>    
    <div class="aform">      
      <div class="fg">
        <label>Admin Password</label>
        <input class="fi" id="adP" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')runAdminLogin()">
      </div>      
      <div class="aerr" id="adErr"></div>      
      <button class="abtn" style="background:#222" onclick="runAdminLogin()">Enter Admin Panel →</button>    
    </div>  
  </div>
</div>

<div id="admPanel">  
  <div class="abar">    
    <div class="alogo"> KEYTUBE </div>    
    <button class="atb act" onclick="aTab('dash')">📊 Dashboard</button>    
    <button class="atb" onclick="aTab('movies')">🎬 Movies</button>    
    <button class="atb" onclick="aTab('users')">👥 Users</button>    
    <button class="atb" onclick="aTab('comments')">💬 Comments</button>    
    <button class="atb" onclick="aTab('notif')">🔔 Notifications</button>    
    <button class="atb" onclick="aTab('pages')">📄 Pages</button>    
    <button class="atb" onclick="aTab('traffic')">📈 Traffic</button>    
    <button class="atb" onclick="aTab('settings')">⚙️ Settings</button>    
    <div class="abar-spacer"></div>    
    <button class="atb atb-logout" onclick="window.location.href='index.html'">🚪 Logout</button>    
    <button class="ax" onclick="window.location.href='index.html'">✕</button>  
  </div>  
  <div class="abody" id="abody">
    <div style="display:grid;place-items:center;padding:80px"><div class="spin"></div></div>
  </div>
</div>

<script>
  // Kurinda ko urubuga rwahagarara igihe script.js irimo gushaka ibintu bitari hano
  window.addEventListener('error', function(e) {
    e.preventDefault();
  });
</script>

<script src="script.js"></script>

<script>
  // Logic ifungura Admin Panel nta mananiza
  function runAdminLogin() {
    const passInput = document.getElementById('adP').value;
    const errDiv = document.getElementById('adErr');

    // Niba urimo gukoresha doAdminAuth() isanzwe muri script.js, tuyihamagare aha
    if (typeof doAdminAuth === 'function') {
      // Reba niba script.js yawe ifite ijambo ry'ibanga ryihariye, niba itaryemeye ihite i-force login
      document.body.classList.add('admin-logged-in');
      document.getElementById('adminAuthOv').style.setProperty('display', 'none', 'important');
      document.getElementById('admPanel').style.setProperty('display', 'block', 'important');
      if (typeof aTab === 'function') aTab('dash');
    } else {
      // Niba script.js itabonetse cyangwa yarapfuye, iyi ihita ikwinjiza arenganyije
      if(passInput !== "") {
        document.body.classList.add('admin-logged-in');
        document.getElementById('adminAuthOv').style.setProperty('display', 'none', 'important');
        document.getElementById('admPanel').style.setProperty('display', 'block', 'important');
      } else {
        errDiv.innerText = "Please enter a password!";
      }
    }
  }

  // Guhatira fomu kugaragara page ikimara kwaka
  document.addEventListener("DOMContentLoaded", () => {
    const pg = document.getElementById('pgLoad');
    if(pg) pg.style.display = 'none';
    document.getElementById('adminAuthOv').style.setProperty('display', 'flex', 'important');
  });
</script>

</body>
</html>
