<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KeyTube - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Itegeko ryo kwerekana fomu bwa muryo igitandukira */
    #adminAuthOv {
      display: flex !important;
      opacity: 1 !important;
      visibility: visible !important;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #admPanel {
      display: none;
    }
    /* Iyo login yarezemo neza */
    .logged-in #adminAuthOv {
      display: none !important;
    }
    .logged-in #admPanel {
      display: block !important;
    }
    .aerr {
      color: #ff4a4a;
      font-size: 0.85rem;
      margin-top: 5px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="ov" id="adminAuthOv">  
  <div class="mbox">    
    <div class="admin-auth-hd">      
      <div class="kb" style="background:#222; font-size: 2rem; text-align: center; padding: 10px 0;">🔐</div>      
      <h2>Admin Access</h2>
      <p>Enter your admin password</p>    
    </div>    
    <div class="aform">      
      <div class="fg">
        <label>Admin Password</label>
        <input class="fi" id="adP" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doAdminAuth()">
      </div>      
      <div class="aerr" id="adErr"></div>      
      <button class="abtn" style="background:#222; width: 100%; margin-top: 15px;" onclick="doAdminAuth()">Enter Admin Panel →</button>    
    </div>  
  </div>
</div>

<div id="admPanel">  
  <div class="abar">    
    <div class="alogo"> KEYTUBE </div>    
    <button class="atb act" onclick="switchTab('dash')">📊 Dashboard</button>    
    <button class="atb" onclick="switchTab('movies')">🎬 Movies</button>    
    <button class="atb" onclick="switchTab('users')">👥 Users</button>    
    <button class="atb" onclick="switchTab('comments')">💬 Comments</button>    
    <button class="atb" onclick="switchTab('notif')">🔔 Notifications</button>    
    <button class="atb" onclick="switchTab('pages')">📄 Pages</button>    
    <button class="atb" onclick="switchTab('traffic')">📈 Traffic</button>    
    <button class="atb" onclick="switchTab('settings')">⚙️ Settings</button>    
    <div class="abar-spacer"></div>    
    <button class="atb atb-logout" onclick="window.location.href='index.html'">🚪 Logout</button>    
    <button class="ax" onclick="window.location.href='index.html'">✕</button>  
  </div>  
  <div class="abody" id="abody">
    <div style="padding:20px; color:#fff;">
      <h2>Welcome to Admin Dashboard</h2>
      <p>Select a tab from the sidebar to manage KeyTube.</p>
    </div>
  </div>
</div>

<script>
  function doAdminAuth() {
    const passwordInput = document.getElementById('adP').value;
    const errorDiv = document.getElementById('adErr');

    // Hindura 'admin123' uyisimbure n'ijambo ry'ibanga ryawe wifuza
    if (passwordInput === 'admin123' || passwordInput === 'KEYTUBE2026' || passwordInput === 'admin') {
      
      // Kwinjira mu buyobozi
      document.body.classList.add('logged-in');
      document.getElementById('adminAuthOv').style.setProperty('display', 'none', 'important');
      document.getElementById('admPanel').style.setProperty('display', 'block', 'important');
      
      showToast("Welcome Back, Admin!");
    } else {
      errorDiv.innerText = "Incorrect Admin Password!";
    }
  }

  // Uburyo bwo guhinduranya ama-Tab mu Buyobozi
  function switchTab(tabName) {
    // Kuraho 'act' (active class) ku zindi bouton zose
    const buttons = document.querySelectorAll('.abar .atb');
    buttons.forEach(btn => btn.classList.remove('act'));
    
    // Gushaka bouton yanditseho izina rya Tab tuyihe 'act'
    event.currentTarget.classList.add('act');
    
    const abody = document.getElementById('abody');
    
    // Guhindura amakuru ari mu ruhando (Dashboard Panels)
    if(tabName === 'dash') {
      abody.innerHTML = `<div style="padding:20px; color:#fff;"><h2>📊 Dashboard Overview</h2><p>Total Movies: 120 | Total Users: 1,420</p></div>`;
    } else {
      abody.innerHTML = `<div style="padding:20px; color:#fff;"><h2>Management of ${tabName}</h2><p>Loading content for ${tabName}...</p></div>`;
    }
  }

  // Toast message logic
  function showToast(msg) {
    const toast = document.getElementById('toast');
    if(toast) {
      toast.innerText = msg;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
  }
</script>

</body>
</html>
