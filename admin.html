<!DOCTYPE html><html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>KEYTUBE - Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">  
</head>
<body>

    <div id="pbar"></div>
    <div id="toast"></div>

    <div class="ov" id="adminAuthOv" style="display: flex; position: fixed; z-index: 9999;">
      <div class="mbox" style="box-shadow: none; margin: auto; max-width: 400px;">
        <div class="admin-auth-hd" style="text-align: center; margin-bottom: 20px;">
          <div class="kb" style="background:#222; font-size: 3rem; margin-bottom: 10px;">🔐</div>
          <h2 style="font-family: 'Bebas Neue'; letter-spacing: 1px; font-size: 2rem;">Admin Access</h2>
          <p style="color: var(--t2); font-size: 0.9rem;">Enter your admin credentials to continue</p>
        </div>
        <div class="aform">
          <div class="fg" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">Admin Gmail / Username</label>
            <input class="fi" id="adEmail" type="email" placeholder="admin@keytube.com" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
          </div>
          <div class="fg" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500;">Admin Password</label>
            <input class="fi" id="adP" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminAuth()" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
          </div>
          <div class="aerr" id="adErr" style="color: var(--red); font-size: 0.85rem; margin-bottom: 10px;"></div>
          <button class="abtn" style="background:#222; color: #fff; width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;" onclick="doAdminAuth()">Enter Admin Panel →</button>
        </div>
      </div>
    </div>

    <div id="admPanel" style="display:none; height: 100vh; width: 100vw;">
      <div class="abar">
        <div class="alogo" style="font-family: 'Bebas Neue'; font-size: 1.8rem; letter-spacing: 1px; padding: 20px; text-align: center;"> KEYTUBE </div>
        <button class="atb act" onclick="aTab('dash')">📊 Dashboard</button>
        <button class="atb" onclick="aTab('movies')">🎬 Movies</button>
        <button class="atb" onclick="aTab('users')">👥 Users</button>
        <button class="atb" onclick="aTab('comments')">💬 Comments</button>
        <button class="atb" onclick="aTab('notif')">🔔 Notifications</button>
        <button class="atb" onclick="aTab('pages')">📄 Pages</button>
        <button class="atb" onclick="aTab('traffic')">📈 Traffic</button>
        <button class="atb" onclick="aTab('settings')">⚙️ Settings</button>
        <div class="abar-spacer"></div>
        <button class="atb atb-logout" onclick="adminLogout()" style="margin-top: auto; color: var(--red);">🚪 Logout</button>
      </div>
      
      <div class="abody" id="abody" style="flex: 1; padding: 20px; overflow-y: auto;">
        <div style="display:grid;place-items:center;padding:80px">
            <div class="spin"></div>
        </div>
      </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
