<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KeyTube - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* BIHATERA FOMU KUGARAGARA KO KANYA PAGE IFUNGUXEMO */
    #localAdminAuthOv {
      position: fixed !important;
      top: 0 !important; left: 0 !important; 
      width: 100vw !important; height: 100vh !important;
      background: #0f0f0f !important;
      z-index: 999999 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    .local-mbox {
      background: #1a1a1a !important;
      border: 1px solid #333 !important;
      padding: 30px !important;
      border-radius: 12px !important;
      max-width: 400px !important;
      width: 90% !important;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
    }
    .local-hd {
      text-align: center !important;
      margin-bottom: 20px !important;
    }
    .local-hd h2 {
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 2.2rem !important;
      letter-spacing: 1px !important;
      color: #fff !important;
      margin: 10px 0 5px 0 !important;
    }
    .local-hd p {
      color: #aaa !important;
      font-size: 0.9rem !important;
      margin: 0 !important;
    }
    .local-input-group {
      margin-bottom: 15px !important;
    }
    .local-input-group label {
      display: block !important;
      color: #ccc !important;
      margin-bottom: 8px !important;
      font-size: 0.85rem !important;
    }
    .local-fi {
      width: 100% !important;
      padding: 12px !important;
      background: #2b2b2b !important;
      border: 1px solid #444 !important;
      border-radius: 6px !important;
      color: #fff !important;
      font-size: 1rem !important;
      box-sizing: border-box !important;
    }
    .local-fi:focus {
      border-color: #ff4a4a !important;
      outline: none !important;
    }
    .local-btn {
      width: 100% !important;
      padding: 12px !important;
      background: #ff4a4a !important;
      color: #fff !important;
      border: none !important;
      border-radius: 6px !important;
      font-size: 1rem !important;
      font-weight: 500 !important;
      cursor: pointer !important;
      transition: background 0.2s !important;
    }
    .local-btn:hover {
      background: #e03e3e !important;
    }
    .local-err {
      color: #ff4a4a !important;
      font-size: 0.85rem !important;
      margin-top: 8px !important;
      text-align: center !important;
      min-height: 18px !important;
    }
    
    /* PANEL Y'UBUYUBOZI IFUNZWE */
    #localAdmPanel {
      display: none;
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      background: #141414 !important;
      z-index: 99999 !important;
    }
    
    /* IYO LOGIN YAKOZE NEZA */
    .admin-ok #localAdminAuthOv {
      display: none !important;
    }
    .admin-ok #localAdmPanel {
      display: block !important;
    }
  </style>
</head>
<body>

<div id="localAdminAuthOv">  
  <div class="local-mbox">    
    <div class="local-hd">      
      <div style="font-size: 2.5rem;">🔐</div>      
      <h2>Admin Access</h2>
      <p>Enter your admin password</p>    
    </div>    
    
    <form onsubmit="handleLocalLogin(event)">      
      <div class="local-input-group">
        <label>Admin Password</label>
        <input class="local-fi" id="localPassInput" type="password" placeholder="••••••••" required autocomplete="current-password">
      </div>      
      <div class="local-err" id="localErrorDiv"></div>      
      <button type="submit" class="local-btn">Enter Admin Panel →</button>    
    </form>
  </div>
</div>

<div id="localAdmPanel">  
  <div class="abar">    
    <div class="alogo"> KEYTUBE </div>    
    <button class="atb act" onclick="switchTabContent('dash')">📊 Dashboard</button>    
    <button class="atb" onclick="switchTabContent('movies')">🎬 Movies</button>    
    <button class="atb" onclick="switchTabContent('users')">👥 Users</button>    
    <button class="atb" onclick="switchTabContent('comments')">💬 Comments</button>    
    <button class="atb" onclick="switchTabContent('notif')">🔔 Notifications</button>    
    <button class="atb" onclick="switchTabContent('pages')">📄 Pages</button>    
    <button class="atb" onclick="switchTabContent('traffic')">📈 Traffic</button>    
    <button class="atb" onclick="switchTabContent('settings')">⚙️ Settings</button>    
    <div class="abar-spacer"></div>    
    <button class="atb atb-logout" onclick="window.location.href='index.html'">🚪 Logout</button>    
    <button class="ax" onclick="window.location.href='index.html'">✕</button>  
  </div>  
  <div class="abody" id="localPanelBody">
    <div style="padding: 30px; color: #fff;">
      <h2>📊 Dashboard Overview</h2>
      <p style="color: #aaa; margin-top: 10px;">Welcome back, Administrator! Here is your general control data:</p>
      <div style="display: flex; gap: 20px; margin-top: 20px;">
        <div style="background: #222; padding: 20px; border-radius: 8px; flex: 1; border: 1px solid #333;">
          <h3 style="color: #ff4a4a;">120</h3>
          <p style="color: #888; font-size: 0.85rem;">Total Movies</p>
        </div>
        <div style="background: #222; padding: 20px; border-radius: 8px; flex: 1; border: 1px solid #333;">
          <h3 style="color: #ff4a4a;">1,420</h3>
          <p style="color: #888; font-size: 0.85rem;">Total Users</p>
        </div>
        <div style="background: #222; padding: 20px; border-radius: 8px; flex: 1; border: 1px solid #333;">
          <h3 style="color: #ff4a4a;">42</h3>
          <p style="color: #888; font-size: 0.85rem;">Pending Comments</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function handleLocalLogin(e) {
    e.preventDefault(); // Bihagarika gufreshing kwa page (No Page Reload)
    
    const inputPass = document.getElementById('localPassInput').value.trim();
    const errorDiv = document.getElementById('localErrorDiv');

    // Amagambo y'ibanga yose ushobora kwandika hano kwinjira (Urugero: admin, KEYTUBE2026, admin123)
    if (inputPass === 'admin' || inputPass === 'KEYTUBE2026' || inputPass === 'admin123') {
      
      // Fungura Admin Panel ku nguvu ukoresheje class nshya
      document.body.classList.add('admin-ok');
      errorDiv.innerText = "";
    } else {
      errorDiv.innerText = "Incorrect Admin Password!";
    }
  }

  // Uburyo bwo guhinduranya ama-Tab imbere muli Panel
  function switchTabContent(tabName) {
    const buttons = document.querySelectorAll('.abar .atb');
    buttons.forEach(btn => btn.classList.remove('act'));
    event.currentTarget.classList.add('act');
    
    const panelBody = document.getElementById('localPanelBody');
    
    if (tabName === 'dash') {
      panelBody.innerHTML = `
        <div style="padding: 30px; color: #fff;">
          <h2>📊 Dashboard Overview</h2>
          <p style="color: #aaa; margin-top: 10px;">Welcome back, Administrator! Here is your general control data:</p>
          <div style="display: flex; gap: 20px; margin-top: 20px;">
            <div style="background: #222; padding: 20px; border-radius: 8px; flex: 1; border: 1px solid #333;"><h3 style="color: #ff4a4a;">120</h3><p style="color: #888; font-size: 0.85rem;">Total Movies</p></div>
            <div style="background: #222; padding: 20px; border-radius: 8px; flex: 1; border: 1px solid #333;"><h3 style="color: #ff4a4a;">1,420</h3><p style="color: #888; font-size: 0.85rem;">Total Users</p></div>
            <div style="background: #222; padding: 20px; border-radius: 8px; flex: 1; border: 1px solid #333;"><h3 style="color: #ff4a4a;">42</h3><p style="color: #888; font-size: 0.85rem;">Pending Comments</p></div>
          </div>
        </div>`;
    } else {
      panelBody.innerHTML = `
        <div style="padding: 30px; color: #fff;">
          <h2>Management of ${tabName.toUpperCase()}</h2>
          <p style="color: #aaa; margin-top: 10px;">The database table for ${tabName} is connected successfully.</p>
          <div style="margin-top: 20px; background: #222; padding: 20px; border-radius: 8px; border: 1px solid #333; text-align: center; color: #666;">
            [ No entries found in ${tabName} data table ]
          </div>
        </div>`;
    }
  }
</script>

</body>
</html>
