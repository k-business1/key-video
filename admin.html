<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KeyTube - Admin Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Itegeko ryo guhatira fomu kugaragara bwa muryo */
    #adminAuthOv {
      display: flex !important;
      opacity: 1 !important;
      visibility: visible !important;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #admPanel {
      display: none;
    }
    /* Iyo login yarezemo neza */
    .logged-in #adminAuthOv {
      display: none !important;
    }
    .logged-in #admPanel {
      display: block !important;
    }
    .aerr {
      color: #ff4a4a;
      font-size: 0.85rem;
      margin-top: 5px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="ov" id="adminAuthOv">  
  <div class="mbox">    
    <div class="admin-auth-hd">      
      <div class="kb" style="background:#222; font-size: 2rem; text-align: center; padding: 10px 0;">🔐</div>      
      <h2>Admin Access</h2>
      <p>Enter your admin password</p>    
    </div>    
    <div class="aform">      
      <div class="fg">
        <label>Admin Password</label>
        <input class="fi" id="adP" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') executeAdminLogin()">
      </div>      
      <div class="aerr" id="adErr"></div>      
      <button class="abtn" style="background:#222; width: 100%; margin-top: 15px;" onclick="executeAdminLogin()">Enter Admin Panel →</button>    
    </div>  
  </div>
</div>

<div id="admPanel">  
  <div class="abar">    
    <div class="alogo"> KEYTUBE </div>    
    <button class="atb act" onclick="switchAdminTab('dash')">📊 Dashboard</button>    
    <button class="atb" onclick="switchAdminTab('movies')">🎬 Movies</button>    
    <button class="atb" onclick="switchAdminTab('users')">👥 Users</button>    
    <button class="atb" onclick="switchAdminTab('comments')">💬 Comments</button>    
    <button class="atb" onclick="switchAdminTab('notif')">🔔 Notifications</button>    
    <button class="atb" onclick="switchAdminTab('pages')">📄 Pages</button>    
    <button class="atb" onclick="switchAdminTab('traffic')">📈 Traffic</button>    
    <button class="atb" onclick="switchAdminTab('settings')">⚙️ Settings</button>    
    <div class="abar-spacer"></div>    
    <button class="atb atb-logout" onclick="window.location.href='index.html'">🚪 Logout</button>    
    <button class="ax" onclick="window.location.href='index.html'">✕</button>  
  </div>  
  <div class="abody" id="abody">
    <div style="padding:20px; color:#fff;">
      <h2>📊 Dashboard Overview</h2>
      <p>Total Movies: 120 | Total Users: 1,420</p>
    </div>
  </div>
</div>

<script>
  function executeAdminLogin() {
    const passwordInput = document.getElementById('adP').value;
    const errorDiv = document.getElementById('adErr');

    // Hano harimo amagambo y'ibanga ushobora kwandikamo (Urugero: 'admin' cyangwa 'KEYTUBE2026')
    if (passwordInput === 'admin' || passwordInput === 'KEYTUBE2026' || passwordInput === 'admin123') {
      
      // Ibi bihita bikuraho fomu, bikazana Dashboard bwa muryo
      document.body.classList.add('logged-in');
      document.getElementById('adminAuthOv').style.setProperty('display', 'none', 'important');
      document.getElementById('admPanel').style.setProperty('display', 'block', 'important');
      
      // Niba script.js isanzwe uhitamo kuyikoresha, reba niba aTab ihari
      if (typeof aTab === 'function') {
        try { aTab('dash'); } catch(e) { console.log(e); }
      }
    } else {
      errorDiv.innerText = "Incorrect Admin Password!";
    }
  }

  // To switch sections inside the panel without script.js crashing
  function switchAdminTab(tabName) {
    const buttons = document.querySelectorAll('.abar .atb');
    buttons.forEach(btn => btn.classList.remove('act'));
    event.currentTarget.classList.add('act');
    
    const abody = document.getElementById('abody');
    if (typeof aTab === 'function') {
      try { 
        aTab(tabName); 
        return;
      } catch(e) {}
    }
    
    // Fallback niba script.js itari gukora
    if(tabName === 'dash') {
      abody.innerHTML = `<div style="padding:20px; color:#fff;"><h2>📊 Dashboard Overview</h2><p>Total Movies: 120 | Total Users: 1,420</p></div>`;
    } else {
      abody.innerHTML = `<div style="padding:20px; color:#fff;"><h2>Management of ${tabName}</h2><p>Loading records for ${tabName}...</p></div>`;
    }
  }
</script>

</body>
</html>
