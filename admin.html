<!DOCTYPE html><html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>KEYTUBE - Admin Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">  
    <style>
        /* Ibi bituma login ipaji igaragara neza niyo haba hari ibyo style.css iyihisha */
        .admin-login-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }
        .admin-box {
            background: #1e1e1e;
            color: #fff;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="pbar"></div>
    <div id="toast"></div>

    <div id="adminAuthOv" class="admin-login-bg">
      <div class="admin-box">
        <div class="admin-auth-hd" style="text-align: center; margin-bottom: 20px;">
          <div style="font-size: 3rem; margin-bottom: 10px;">🔐</div>
          <h2 style="font-family: 'Bebas Neue'; letter-spacing: 1px; font-size: 2.2rem; margin:0;">Admin Access</h2>
          <p style="color: #aaa; font-size: 0.9rem; margin-top: 5px;">Enter your admin credentials to continue</p>
        </div>
        <div class="aform">
          <div class="fg" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500; color: #ccc;">Admin Gmail</label>
            <input class="fi" id="adEmail" type="email" placeholder="admin@keytube.com" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #2b2b2b; color: #fff; box-sizing: border-box;">
          </div>
          <div class="fg" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: 500; color: #ccc;">Admin Password</label>
            <input class="fi" id="adP" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminAuth()" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444; background: #2b2b2b; color: #fff; box-sizing: border-box;">
          </div>
          <div class="aerr" id="adErr" style="color: #ff4a4a; font-size: 0.85rem; margin-bottom: 10px; text-align: center;"></div>
          <button class="abtn" style="background: #e50914; color: #fff; width: 100%; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem;" onclick="doAdminAuth()">Enter Admin Panel →</button>
        </div>
      </div>
    </div>

    <div id="admPanel" style="display:none; height: 100vh; width: 100vw; flex-direction: row;">
      <div class="abar" style="width: 250px; background: #111; height: 100vh; display: flex; flex-direction: column;">
        <div class="alogo" style="font-family: 'Bebas Neue'; font-size: 1.8rem; letter-spacing: 1px; padding: 20px; text-align: center; color: #e50914;"> KEYTUBE </div>
        <button class="atb act" onclick="aTab('dash')">📊 Dashboard</button>
        <button class="atb" onclick="aTab('movies')">🎬 Movies</button>
        <button class="atb" onclick="aTab('users')">👥 Users</button>
        <button class="atb" onclick="aTab('comments')">💬 Comments</button>
        <button class="atb" onclick="aTab('notif')">🔔 Notifications</button>
        <button class="atb" onclick="aTab('pages')">📄 Pages</button>
        <button class="atb" onclick="aTab('traffic')">📈 Traffic</button>
        <button class="atb" onclick="aTab('settings')">⚙️ Settings</button>
        <div style="flex-grow: 1;"></div>
        <button class="atb atb-logout" onclick="adminLogout()" style="color: #ff4a4a; border-top: 1px solid #222;">🚪 Logout</button>
      </div>
      
      <div class="abody" id="abody" style="flex: 1; padding: 20px; overflow-y: auto; background: #1a1a1a; color: #fff;">
        <h2>Dashboard</h2>
        <p>Welcome to the KeyTube Admin Panel.</p>
        <div style="display:grid;place-items:center;padding:80px">
            <div class="spin"></div>
        </div>
      </div>
    </div>

    <script>
      // Kora login (Ugerageze niba bikora)
      function doAdminAuth() {
        var email = document.getElementById('adEmail').value;
        var pass = document.getElementById('adP').value;
        var err = document.getElementById('adErr');

        // Aha ushobora n'akahindura bitewe n'ijambo ry'ibanga ushaka
        if(pass === "admin123") { 
          // Hisha login, fungura admin panel
          document.getElementById('adminAuthOv').style.display = 'none';
          document.getElementById('admPanel').style.display = 'flex';
        } else {
          err.innerText = "Password cyangwa Email si byo!";
        }
      }

      // Kora logout
      function adminLogout() {
        document.getElementById('admPanel').style.display = 'none';
        document.getElementById('adminAuthOv').style.display = 'flex';
        document.getElementById('adP').value = ""; // Siba password yari rimo
      }

      // Tab switch (Guhinduranya ibice)
      function aTab(tabName) {
        var abody = document.getElementById('abody');
        // Guhindura ibiri muri Dashboard bitewe n'icyo ukanze
        abody.innerHTML = "<h2>" + tabName.toUpperCase() + " Panel</h2><p>Ibi bice biri gushakishwa...</p>";
      }
    </script>
</body>
</html>
