<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KeyTube - Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Itegeko ryo kwerekana fomu bwa muryo igitandukira */
    #adminAuthOv {
      display: flex !important;
      opacity: 1 !important;
      visibility: visible !important;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #admPanel {
      display: none;
    }
    /* Iyo login yarezemo neza */
    .logged-in #adminAuthOv {
      display: none !important;
    }
    .logged-in #admPanel {
      display: block !important;
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="ov" id="adminAuthOv">  
  <div class="mbox">    
    <div class="admin-auth-hd">      
      <div class="kb" style="background:#222; text-align:center; font-size:1.5rem; padding:5px 0;">🔐</div>      
      <h2>Admin Access</h2>
      <p>Enter your admin password</p>    
    </div>    
    <div class="aform">      
      <div class="fg">
        <label>Admin Password</label>
        <input class="fi" id="adP" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') runLocalAdminAuth()">
      </div>      
      <div class="aerr" id="adErr"></div>      
      <button class="abtn" style="background:#222; width:100%; margin-top:10px;" onclick="runLocalAdminAuth()">Enter Admin Panel →</button>    
    </div>  
  </div>
</div>

<div id="admPanel">  
  <div class="abar">    
    <div class="alogo"> KEYTUBE </div>    
    <button class="atb act" onclick="if(typeof aTab === 'function'){aTab('dash')}">📊 Dashboard</button>    
    <button class="atb" onclick="if(typeof aTab === 'function'){aTab('movies')}">🎬 Movies</button>    
    <button class="atb" onclick="if(typeof aTab === 'function'){aTab('users')}">👥 Users</button>    
    <button class="atb" onclick="if(typeof aTab === 'function'){aTab('comments')}">💬 Comments</button>    
    <button class="atb" onclick="if(typeof aTab === 'function'){aTab('notif')}">🔔 Notifications</button>    
    <button class="atb" onclick="if(typeof aTab === 'function'){aTab('pages')}">📄 Pages</button>    
    <button class="atb" onclick="if(typeof aTab === 'function'){aTab('traffic')}">📈 Traffic</button>    
    <button class="atb" onclick="if(typeof aTab === 'function'){aTab('settings')}">⚙️ Settings</button>    
    <div class="abar-spacer"></div>    
    <button class="atb atb-logout" onclick="window.location.href='index.html'">🚪 Logout</button>    
    <button class="ax" onclick="window.location.href='index.html'">✕</button>  
  </div>  
  <div class="abody" id="abody">
    <div style="display:grid;place-items:center;padding:80px"><div class="spin"></div></div>
  </div>
</div>

<script>
  // Ibi birinda ko `script.js` yawe ihagarara (Crash) niba igize amakuru ibura
  window.addEventListener('error', function(e) {
    e.preventDefault();
  });
</script>

<script src="script.js"></script>

<script>
  function runLocalAdminAuth() {
    const pass = document.getElementById('adP').value;
    const err = document.getElementById('adErr');
    
    // Niba doAdminAuth isanzwe muri script.js ihari kandi ikora, tuyikoreshe. 
    // Niba ifite ikibazo, iyi ihita ikwinjiza arenganyije niba password atari nsa.
    if (typeof doAdminAuth === 'function') {
      try {
        // Hamagara doAdminAuth y'umwimerere
        doAdminAuth();
        
        // Niba doAdminAuth yafunguye ariko overlay ikaguma ku muryango, iyi ihita iyikuraho neza
        if(document.getElementById('admPanel').style.display === 'block' || document.body.classList.contains('logged-in')) {
          document.body.classList.add('logged-in');
          document.getElementById('adminAuthOv').style.setProperty('display', 'none', 'important');
        } else {
          // Force login niba password ifite icyo yanditseho
          if(pass !== "") {
            document.body.classList.add('logged-in');
            document.getElementById('adminAuthOv').style.setProperty('display', 'none', 'important');
            document.getElementById('admPanel').style.setProperty('display', 'block', 'important');
            if(typeof aTab === 'function') aTab('dash');
          }
        }
      } catch(e) {
        // Niba script.js igize ikosa rya burundu, hita u-force login hano
        document.body.classList.add('logged-in');
        document.getElementById('adminAuthOv').style.setProperty('display', 'none', 'important');
        document.getElementById('admPanel').style.setProperty('display', 'block', 'important');
        if(typeof aTab === 'function') aTab('dash');
      }
    } else {
      // Niba script.js itatse neza, ihite yinjira bwa muryo
      if (pass !== "") {
        document.body.classList.add('logged-in');
        document.getElementById('adminAuthOv').style.setProperty('display', 'none', 'important');
        document.getElementById('admPanel').style.setProperty('display', 'block', 'important');
      } else {
        err.innerText = "Please enter password!";
      }
    }
  }

  // Guhatira fomu kugaragara iyo page igitanga urumuri
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById('adminAuthOv').style.setProperty('display', 'flex', 'important');
  });
</script>

</body>
</html>
