<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KEYTUBE - Admin Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght=300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    :root {
      --bg-white: #ffffff;
      --bg-light: #f8f9fa;
      --red-primary: #e50914;
      --red-hover: #b20710;
      --text-dark: #111111;
      --text-muted: #666666;
      --border-color: #e0e0e0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
    }

    body {
      background-color: var(--bg-light) !important;
      color: var(--text-dark) !important;
      overflow-x: hidden;
    }

    /* WHITE & RED LOGIN OVERLAY */
    #adminAuthOv {
      position: fixed !important;
      top: 0 !important; left: 0 !important; 
      width: 100vw !important; height: 100vh !important;
      background: rgba(255, 255, 255, 0.98) !important;
      z-index: 999999 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }

    .mbox {
      background: var(--bg-white) !important;
      border: 2px solid var(--red-primary) !important;
      padding: 35px 30px !important;
      border-radius: 12px !important;
      max-width: 400px !important;
      width: 90% !important;
      box-shadow: 0 10px 40px rgba(229, 9, 20, 0.1) !important;
    }

    .admin-auth-hd {
      text-align: center !important;
      margin-bottom: 25px !important;
    }

    .admin-auth-hd h2 {
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 2.5rem !important;
      letter-spacing: 1px !important;
      color: var(--red-primary) !important;
      margin: 10px 0 5px 0 !important;
    }

    .admin-auth-hd p {
      color: var(--text-muted) !important;
      font-size: 0.9rem !important;
    }

    .fg {
      margin-bottom: 20px !important;
    }

    .fg label {
      display: block !important;
      color: var(--text-dark) !important;
      font-weight: 500;
      margin-bottom: 8px !important;
      font-size: 0.85rem !important;
    }

    .fi {
      width: 100% !important;
      padding: 12px 15px !important;
      background: var(--bg-light) !important;
      border: 1px solid var(--border-color) !important;
      border-radius: 6px !important;
      color: var(--text-dark) !important;
      font-size: 1rem !important;
      transition: border-color 0.2s;
    }

    .fi:focus {
      border-color: var(--red-primary) !important;
      outline: none !important;
      background: var(--bg-white) !important;
    }

    .abtn {
      width: 100% !important;
      padding: 14px !important;
      background: var(--red-primary) !important;
      color: #fff !important;
      border: none !important;
      border-radius: 6px !important;
      font-size: 1rem !important;
      font-weight: 700 !important;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer !important;
      transition: background 0.2s !important;
    }

    .abtn:hover {
      background: var(--red-hover) !important;
    }

    .aerr {
      color: var(--red-primary) !important;
      font-size: 0.85rem !important;
      margin-top: 10px !important;
      text-align: center !important;
      font-weight: 500;
      min-height: 18px !important;
    }

    /* WHITE & RED ADMIN PANEL SIDEBAR & BODY */
    #admPanel {
      display: none;
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      background: var(--bg-light) !important;
      z-index: 99999 !important;
    }

    .abar {
      position: fixed;
      top: 0; left: 0;
      width: 240px; height: 100vh;
      background: var(--bg-white) !important;
      border-right: 1px solid var(--border-color) !important;
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }

    .alogo {
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 2.2rem !important;
      color: var(--red-primary) !important;
      letter-spacing: 2px !important;
      padding: 0 25px 25px 25px !important;
      border-bottom: 1px solid var(--border-color) !important;
      margin-bottom: 15px !important;
    }

    .atb {
      background: none !important;
      border: none !important;
      padding: 12px 25px !important;
      text-align: left !important;
      font-size: 0.95rem !important;
      font-weight: 500 !important;
      color: var(--text-dark) !important;
      cursor: pointer !important;
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
      transition: all 0.2s !important;
    }

    .atb:hover {
      background: var(--bg-light) !important;
      color: var(--red-primary) !important;
    }

    .atb.act {
      background: rgba(229, 9, 24, 0.08) !important;
      color: var(--red-primary) !important;
      border-left: 4px solid var(--red-primary) !important;
      padding-left: 21px !important;
    }

    .abar-spacer {
      flex-grow: 1 !important;
    }

    .atb-logout {
      color: #555 !important;
      border-top: 1px solid var(--border-color) !important;
      padding-top: 15px !important;
    }
    
    .atb-logout:hover {
      color: var(--red-primary) !important;
      background: rgba(229, 9, 24, 0.05) !important;
    }

    .ax {
      position: absolute !important;
      top: 20px !important; right: 20px !important;
      background: none !important;
      border: none !important;
      font-size: 1.2rem !important;
      color: var(--text-muted) !important;
      cursor: pointer !important;
    }

    .abody {
      margin-left: 240px !important;
      padding: 40px !important;
      height: 100vh !important;
      overflow-y: auto !important;
      background: var(--bg-light) !important;
      color: var(--text-dark) !important;
    }

    /* FORCE LIGHT THEME FOR PANEL CONTENT */
    .abody h2, .abody h3, .abody th, .abody td, .abody p {
      color: var(--text-dark) !important;
    }

    /* IYO LOGIN YAKOZE NEZA CYANGWA SCRIPT.JS IFUNGUYE PANEL */
    .admin-ok #adminAuthOv {
      display: none !important;
    }
    .admin-ok #admPanel {
      display: block !important;
    }
  </style>
</head>
<body>

<div id="toast"></div>

<div style="display:none !important;">
  <div id="pbar"></div><div id="pgLoad"></div><div id="loginReq"></div>
  <nav id="nav"><div class="nav-links"></div><input id="si"><button id="admNavBtn"></button></nav>
  <div id="hero"><div id="hTitle"></div><div id="hMeta"></div><div id="hDesc"></div><div id="hDots"></div><img id="hCover"></div>
  <div class="catpills" id="catPills"></div><div id="trendSec"><div id="tRow"></div></div><div id="newSec"><div id="nRow"></div></div>
  <div id="mGrid"></div><div id="emptySt"><p id="emptyMsg"></p></div><div id="guestBanner"></div><span id="yrSpan">2026</span>
</div>

<div class="ov" id="adminAuthOv">  
  <div class="mbox">    
    <div class="admin-auth-hd">      
      <div style="font-size: 2.5rem; color: var(--red-primary);">🔐</div>      
      <h2>Admin Access</h2>
      <p>Verifying password via Google Apps Script</p>    
    </div>    
    
    <form class="aform" onsubmit="forwardToScriptJs(event)">      
      <div class="fg">
        <label>Admin Password</label>
        <input class="fi" id="adP" type="password" placeholder="••••••••" required autocomplete="current-password">
      </div>      
      <div class="aerr" id="adErr"></div>      
      <button type="submit" class="abtn">Enter Admin Panel →</button>    
    </form>
  </div>
</div>

<div id="admPanel">  
  <div class="abar">    
    <div class="alogo">KEYTUBE</div>    
    <button class="atb act" onclick="aTab('dash')">📊 Dashboard</button>    
    <button class="atb" onclick="aTab('movies')">🎬 Movies</button>    
    <button class="atb" onclick="aTab('users')">👥 Users</button>    
    <button class="atb" onclick="aTab('comments')">💬 Comments</button>    
    <button class="atb" onclick="aTab('notif')">🔔 Notifications</button>    
    <button class="atb" onclick="aTab('pages')">📄 Pages</button>    
    <button class="atb" onclick="aTab('traffic')">📈 Traffic</button>    
    <button class="atb" onclick="aTab('settings')">⚙️ Settings</button>    
    <div class="abar-spacer"></div>    
    <button class="atb atb-logout" onclick="adminLogout()">🚪 Logout</button>    
    <button class="ax" onclick="closeAdmin()">✕</button>  
  </div>  
  
  <div class="abody" id="abody">
    <div style="display:grid;place-items:center;padding:80px"><div class="spin"></div></div>
  </div>
</div>

<script>
  window.addEventListener('error', function(e) {
    e.preventDefault(); 
  });
</script>

<script src="script.js"></script>

<script>
  function forwardToScriptJs(e) {
    if(e) e.preventDefault();
    const errorDiv = document.getElementById('adErr');
    
    // Niba doAdminAuth() yo muli script.js ihari, tuyikoreshe ngo yohereze password kuri Apps Script
    if (typeof doAdminAuth === 'function') {
      try {
        doAdminAuth(); 
      } catch(err) {
        errorDiv.innerText = "Connection error with Apps Script.";
      }
    } else {
      errorDiv.innerText = "script.js not loaded correctly.";
    }
  }

  // Gukurikirana niba script.js yakiriye password neza ikerekanako panel ifunguye
  setInterval(() => {
    const panel = document.getElementById('admPanel');
    if(panel && (panel.style.display === 'block' || window.getComputedStyle(panel).display === 'block')) {
      document.body.classList.add('admin-ok');
    }
  }, 3000);
</script>

</body>
</html>
