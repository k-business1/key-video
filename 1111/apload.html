<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>KEYTUBE Upload Center</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Roboto,sans-serif;
}

body{

background:#f6f6f6;

color:#111;

}

header{

height:65px;

background:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 25px;

box-shadow:0 2px 10px rgba(0,0,0,.08);

position:sticky;

top:0;

z-index:999;

}

.logo{

display:flex;

align-items:center;

gap:10px;

font-size:24px;

font-weight:bold;

color:#ff0000;

}

.logo img{

width:42px;

height:42px;

object-fit:contain;

}

.container{

max-width:1200px;

margin:auto;

padding:30px;

}

.card{

background:white;

border-radius:12px;

padding:25px;

box-shadow:0 5px 20px rgba(0,0,0,.08);

margin-bottom:25px;

}

.title{

font-size:22px;

font-weight:700;

margin-bottom:20px;

color:#ff0000;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.input{

margin-bottom:18px;

}

.input label{

display:block;

font-size:14px;

font-weight:bold;

margin-bottom:8px;

}

.input input,

.input textarea,

.input select{

width:100%;

padding:12px;

border:1px solid #ddd;

border-radius:8px;

font-size:15px;

outline:none;

transition:.3s;

}

.input input:focus,

.input textarea:focus,

.input select:focus{

border-color:#ff0000;

}

textarea{

resize:none;

height:130px;

}

.uploadBox{

border:2px dashed #ff0000;

padding:40px;

border-radius:12px;

text-align:center;

cursor:pointer;

transition:.3s;

background:#fff8f8;

}

.uploadBox:hover{

background:#ffeaea;

}

.uploadBox img{

width:70px;

margin-bottom:10px;

}

.progress{

width:100%;

height:10px;

background:#ddd;

border-radius:20px;

overflow:hidden;

display:none;

margin-top:15px;

}

.bar{

height:100%;

width:0%;

background:#ff0000;

transition:.3s;

}

.preview{

margin-top:20px;

display:flex;

gap:20px;

flex-wrap:wrap;

}

.preview img{

width:220px;

border-radius:10px;

}

.preview video{

width:320px;

border-radius:10px;

}

button{

padding:14px 30px;

border:none;

background:#ff0000;

color:white;

border-radius:8px;

font-size:16px;

cursor:pointer;

font-weight:bold;

transition:.3s;

}

button:hover{

background:#cc0000;

}

.urlBox{

margin-top:15px;

background:#fafafa;

padding:15px;

border-radius:8px;

border:1px solid #ddd;

word-break:break-all;

}

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

.preview{

flex-direction:column;

}

.preview img,

.preview video{

width:100%;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo.png">

<span>KEYTUBE Upload</span>

</div>

<button onclick="uploadEverything()">

UPLOAD NOW

</button>

</header>

<div class="container">

<div class="card">

<div class="title">

Movie Information

</div>

</select>

</div>

<input
type="text"
id="country"

</div>

<label>Year</label>

<input

value="2026">

</div>

<div class="input">

<label>Rating</label>

<input
type="text"

</div>

<div class="input">

</div>

<div class="input">

value="1">

</div>

<label>

<input

Featured

</label>

<label>

<input
type="checkbox"
id="newRelease">

New Release

</label>

</div>

</div>

<div>

<label>

Cover Image

</label>

<div
class="uploadBox"
onclick="document.getElementById('cover').click()">

<h2>📷</h2>

Click to Select Cover Image

</p>

<input
type="file"
id="cover"
accept="image/*"
hidden>

</div>

<div class="progress">

<div
id="coverBar"
class="bar">

</div>

</div>

<div
class="preview">

<img
id="coverPreview"
style="display:none;">

</div>

<br>

<label>

Movie Video

</label>

<div
class="uploadBox"
onclick="document.getElementById('video').click()">

<h2>🎬</h2>

Click to Select Video

</p>

<input
type="file"
id="video"
accept="video/*"
hidden>

</div>

<div
id="videoBar"
class="bar">

</div>

</div>

<div
class="preview">

<video
id="videoPreview"
controls
style="display:none;">
</video>

</div>

</div>

</div>

Waiting upload...

</span>

<br><br>

<br>

<span id="videoURL">

Waiting upload...

</span>

</div>

</div>

async function saveMovie(coverURL,videoURL){

const movie={

action:"addMovie",

token:sessionStorage.getItem("km_a") || "",

name:document.getElementById("movieName").value,

description:document.getElementById("description").value,

category:document.getElementById("category").value.toLowerCase(),

type:"movie",

country:document.getElementById("country").value,

year:document.getElementById("year").value,

rating:document.getElementById("rating").value,

season:document.getElementById("season").value,

episode:document.getElementById("episode").value,

featured:document.getElementById("featured").checked,

isNew:document.getElementById("newRelease").checked,

cover:coverURL,

videoURL:videoURL,

downloadURL:videoURL

};

const res=await fetch(API,{

method:"POST",

headers:{

"Content-Type":"text/plain"

},

body:JSON.stringify(movie)

});

const data=await res.json();

return data;

}

alert("Select Video");

}

// Upload Cover

}else{

alert("❌ " + (save.msg || "Unable to save movie"));

}catch(err){

console.error(err);
