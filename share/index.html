<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyTube</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    /* BIHINDURA IMAGE COVERS KU BURYO IBA BACKGROUND */
    background: url('image.png') no-repeat center center fixed;
    background-size: cover;
    color: #fff; /* Twagize text umweru ngo isomeke neza hejuru ya background */
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* OVERLAY: Bituma background image ikendera gato ngo text na button bihamye gushashagirana */
body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 1;
}

/* BISUNIKA IBIKORWA BYOSE HEJURU YA OVERLAY */
.content-wrapper {
    position: relative;
    z-index: 2;
    padding: 20px;
}

/* LOGO */
.logo {
    position: fixed;
    bottom: 15px;
    right: 15px;
    width: 80px;
    height: auto;
    z-index: 9999;
}

/* BUTTON */
.watch-btn img {
    margin-top: 20px;
    transition: 0.3s;
}

.watch-btn img:hover {
    transform: scale(1.05);
}

/* TAGS */
.tags {
    margin-top: 30px;
    font-size: 18px;
}

.tags span {
    padding: 5px 10px;
    display: inline-block;
    font-weight: bold;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
}

/* COLORS VIA BACKGROUND TEXT SHADOW FOR REDIRECT READABILITY */
.red { color: #ff3b45; }
.blue { color: #3ab0ff; }
.black { color: #ddd; }

/* FOOTER */
footer {
    margin-top: 40px;
    font-size: 14px;
    color: #ccc;
}
</style>

<script>
    setTimeout(function() {
        window.location.href = "https://www.keytube.work.gd";
    }, 5000); // 5000 milliseconds = 5 seconds. Niba ushaka ko ihita igenda ako kanya, dushyiraho 0
</script>

</head>

<body>

<div class="content-wrapper">

    <img src="../logo.png" class="logo">

    <a href="https://www.keytube.work.gd" class="watch-btn">
        <img src="https://img.shields.io/badge/▶%20CLICK%20HERE%20TO%20WATCH-2196F3?style=for-the-badge&logo=youtube&logoColor=white" alt="Watch Now">
    </a>

    <div class="tags">
        <span class="red">Movies</span>
        <span class="blue">TV Shows</span>
        <span class="black">Series</span>
        <span class="blue">Latest Releases</span>
        <span class="black">Stream Anywhere</span>
    </div>

    <footer>
        © 2026 KeyTube. All Rights Reserved.
    </footer>

</div>

</body>
</html>
