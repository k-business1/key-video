<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyTube</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:white;
    color:#111;
    text-align:center;
}

/* IMAGE */
.hero{
    width:100%;
    max-height:40vh; /* Twaganyijeho gato ngo video nayo ibone umwanya */
    object-fit:cover;
}

/* LOGO */
.logo{
    position: fixed;
    bottom: 15px;
    right: 15px;
    width: 80px;
    height: auto;
    z-index: 9999;
}

/* VIDEO PLAYBACK FRAME CONTAINER */
.video-container {
    position: relative;
    width: 90%;
    max-width: 800px;
    margin: 20px auto;
    aspect-ratio: 16 / 9; /* Bikomeza imiterere ya Video isanzwe */
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

.video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
}

/* TAGS */
.tags{
    margin-top:20px;
    font-size:18px;
    color:#333;
}

.tags span{
    padding:5px 10px;
    display: inline-block;
}

/* COLORS */
.red{color:#e50914;}
.blue{color:#2196F3;}
.black{color:#111;}

/* FOOTER */
footer{
    margin-top:30px;
    font-size:14px;
    color:#555;
    padding-bottom: 20px;
}
</style>

</head>

<body>

<img src="image.png" class="hero">

<img src="../logo.png" class="logo">

<div class="video-container">
    <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&rel=0&modestbranding=1" 
        title="KeyTube Video Player" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        allowfullscreen>
    </iframe>
</div>

<div class="tags">
<span class="red">Movies</span>
<span class="blue">TV Shows</span>
<span class="black">Series</span>
<span class="blue">Latest Releases</span>
<span class="black">Stream Anywhere</span>
</div>

<footer>
© 2026 KeyTube. All Rights Reserved.
</footer>

</body>
</html>
