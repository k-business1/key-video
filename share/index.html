<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyTube Neon</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#000;
    color:white;
    text-align:center;
}

/* HERO IMAGE */
.hero{
    width:100%;
    max-height:70vh;
    object-fit:cover;
    filter:contrast(1.2) brightness(0.9);
}

/* LOGO (optional) */
.logo{
    width:90px;
    margin-top:10px;
    filter:drop-shadow(0 0 10px #2196F3);
}

/* BUTTON */
.watch-btn img{
    margin-top:20px;
    transition:0.3s;
    filter:drop-shadow(0 0 15px #ff0000);
}

.watch-btn img:hover{
    transform:scale(1.05);
    filter:drop-shadow(0 0 25px #00aaff);
}

/* TAGS */
.tags{
    margin-top:20px;
    font-size:18px;
    color:#fff;
}

.tags span{
    padding:5px 10px;
}

/* NEON COLORS */
.red{color:#ff2a2a; text-shadow:0 0 10px #ff2a2a;}
.blue{color:#3aa8ff; text-shadow:0 0 10px #3aa8ff;}
.white{color:white;}

/* FOOTER */
footer{
    margin-top:30px;
    font-size:14px;
    color:#3aa8ff;
    text-shadow:0 0 10px #3aa8ff;
}

/* BACKGROUND GLOW EFFECT */
.glow-bg{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:radial-gradient(circle at top, rgba(255,0,0,0.15), transparent 40%),
               radial-gradient(circle at bottom, rgba(0,150,255,0.15), transparent 40%);
    z-index:-1;
}
</style>

</head>

<body>

<div class="glow-bg"></div>

<!-- HERO IMAGE -->
<img src="image.png" class="hero">

<!-- LOGO -->
<img src="../logo.png" class="logo">

<br>

<!-- BUTTON -->
<a href="https://www.keytube.work.gd" class="watch-btn">
<img src="https://img.shields.io/badge/▶%20CLICK%20HERE%20TO%20WATCH-ff0000?style=for-the-badge&logo=youtube&logoColor=white">
</a>

<!-- TAGS -->
<div class="tags">
<span class="red">🤍 Movies</span>
<span class="blue">💙 TV Shows</span>
<span class="white">🤍 Series</span>
<span class="blue">💙 Latest Releases</span>
<span class="white">🤍 Stream Anywhere</span>
</div>

<!-- FOOTER -->
<footer>
© 2026 KeyTube • Neon Streaming Experience
</footer>

</body>
</html>
