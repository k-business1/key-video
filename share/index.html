<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyTube</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:white;
    color:#111;
    text-align:center;
}

/* IMAGE */
.hero{
    width:100%;
    max-height:70vh;
    object-fit:cover;
}

/* LOGO */
.logo{
    position: fixed;
    bottom: 15px;
    right: 15px;
    width: 80px;
    height: auto;
    z-index: 9999;
}
}

/* BUTTON */
.watch-btn img{
    margin-top:20px;
    transition:0.3s;
}

.watch-btn img:hover{
    transform:scale(1.05);
}

/* TAGS */
.tags{
    margin-top:20px;
    font-size:18px;
    color:#333;
}

.tags span{
    padding:5px 10px;
}

/* COLORS */
.red{color:#e50914;}
.blue{color:#2196F3;}
.black{color:#111;}

/* FOOTER */
footer{
    margin-top:30px;
    font-size:14px;
    color:#555;
}
</style>

</head>

<body>

<!-- IMAGE -->
<img src="image.png" class="hero">

<!-- LOGO -->
<img src="../logo.png" class="logo">

<br>

<!-- BUTTON -->
<a href="https://www.keytube.work.gd" class="watch-btn">
<img src="https://img.shields.io/badge/▶%20CLICK%20HERE%20TO%20WATCH-2196F3?style=for-the-badge&logo=youtube&logoColor=white">
</a>

<!-- TAGS -->
<div class="tags">
<span class="red">Movies</span>
<span class="blue">TV Shows</span>
<span class="black">Series</span>
<span class="blue">Latest Releases</span>
<span class="black">Stream Anywhere</span>
</div>

<!-- FOOTER -->
<footer>
© 2026 KeyTube. All Rights Reserved.
</footer>

</body>
</html>
