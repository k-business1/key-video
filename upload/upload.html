<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>Upload · KEYTUBE</title>
</head>
<body>
<div id="pbar"></div>
<div id="pgLoad"><div class="ld">
  <div class="kb kb-logo"><img src="logo.png" alt="KEYTUBE"></div>
  <div class="ld-t">KEYTUBE</div>
  <div class="spin"></div>
</div></div>
<div id="toast"></div>

<!-- ── HEADER (same style as watch.html) ── -->
<header id="hdr">
  <div class="hdr-back" onclick="window.location.href='index.html'">‹</div>
  <div class="logo" onclick="window.location.href='index.html'">
    <div class="kb kb-logo"><img src="logo.png" alt="KEYTUBE"></div>
    <span class="logo-t">KEYTUBE Upload</span>
  </div>
  <div class="hdr-spacer"></div>
  <div class="hdr-r">
    <div id="uChip"><div class="av" id="avEl">U</div></div>
  </div>
</header>

<!-- ── UPLOAD FORM ── -->
<div class="up-card">
  <div class="up-card-title">🎬 Add Movie / Series / Song / News</div>

  <div class="up-fg">
    <label>Title *</label>
    <input type="text" id="movieName" placeholder="Enter title">
  </div>

  <div class="up-fg">
    <label>Description</label>
    <textarea id="description" placeholder="Synopsis / description"></textarea>
  </div>

  <div class="up-grid2">
    <div class="up-fg">
      <label>Type</label>
      <select id="type">
        <option value="movie">Movie</option>
        <option value="series">Series</option>
        <option value="song">Song</option>
        <option value="news">News</option>
      </select>
    </div>
    <div class="up-fg">
      <label>Category</label>
      <select id="category">
        <option value="movies">Movies</option>
        <option value="highligt">Highligt</option>
        <option value="indian">Indian</option>
        <option value="chinese">Chinese</option>
        <option value="drama">Drama</option>
        <option value="comedy">Comedy</option>
        <option value="cartoon">Cartoon</option>
        <option value="news">News</option>
        <option value="song">Song</option>
      </select>
    </div>
  </div>

  <div class="up-grid2">
    <div class="up-fg">
      <label>Country</label>
      <input type="text" id="country" placeholder="Country">
    </div>
    <div class="up-fg">
      <label>Year</label>
      <input type="number" id="year" value="2026">
    </div>
  </div>

  <div class="up-grid3">
    <div class="up-fg">
      <label>Rating</label>
      <input type="text" id="rating" placeholder="8.5">
    </div>
    <div class="up-fg">
      <label>Season</label>
      <input type="number" id="season" value="1">
    </div>
    <div class="up-fg">
      <label>Episode</label>
      <input type="number" id="episode" value="1">
    </div>
  </div>

  <div class="up-checks">
    <label><input type="checkbox" id="featured"> Hero Banner / Featured</label>
    <label><input type="checkbox" id="newRelease"> New Release</label>
  </div>
</div>

<div class="up-card">
  <div class="up-fg">
    <label>Cover Image</label>
    <div class="up-box" id="coverBox" onclick="document.getElementById('cover').click()">
      <div class="up-ic">📷</div>
      <p>Tap to select cover image</p>
      <div class="up-fname" id="coverName"></div>
      <input type="file" id="cover" accept="image/*" hidden>
    </div>
    <div class="up-prog" id="coverProgWrap"><div id="coverBar" class="up-prog-bar"></div></div>
    <div class="up-pct" id="coverPct">0%</div>
    <div class="up-preview"><img id="coverPreview"></div>
  </div>

  <div class="up-fg">
    <label>Movie / Video File <span style="text-transform:none;font-weight:400;color:var(--t3)">(max 100MB)</span></label>
    <div class="up-box" id="videoBox" onclick="document.getElementById('video').click()">
      <div class="up-ic">🎬</div>
      <p>Tap to select video file — 100MB limit</p>
      <div class="up-fname" id="videoName"></div>
      <input type="file" id="video" accept="video/*" hidden>
    </div>
    <div class="aerr" id="videoSizeErr" style="margin-top:6px"></div>
    <div class="up-prog" id="videoProgWrap"><div id="videoBar" class="up-prog-bar"></div></div>
    <div class="up-pct" id="videoPct">0%</div>
    <div class="up-preview"><video id="videoPreview" controls></video></div>
  </div>

  <div class="up-urlbox">
    <b>Cover URL</b>
    <div id="coverURL">Waiting upload...</div>
    <b>Video URL</b>
    <div id="videoURL">Waiting upload...</div>
  </div>

  <div class="aerr" id="saveErr" style="margin-bottom:4px"></div>
  <button class="up-submit hidden" id="retryBtn" onclick="retrySaveOnly()" style="background:var(--txt);margin-bottom:8px">↻ Retry Save (files already uploaded)</button>
  <button class="up-submit" id="uploadBtn" onclick="uploadEverything()">⬆ Upload &amp; Save</button>
</div>

<script src="app.js"></script>
<script src="upload.js"></script>
</body>
</html>
